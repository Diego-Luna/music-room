name: Flutter Web CI

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'frontend/**'
      - '.github/workflows/flutter-web.yml'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'frontend/**'
      - '.github/workflows/flutter-web.yml'

permissions:
  contents: read

concurrency:
  group: flutter-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    name: Build Flutter Web (frontend/music_room_app)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            frontend/music_room_app/.dart_tool
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('frontend/music_room_app/pubspec.lock', 'frontend/music_room_app/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-flutter-pub-

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable web support and run doctor
        run: |
          flutter config --enable-web
          flutter doctor -v

      - name: Get dependencies
        working-directory: frontend/music_room_app
        run: flutter pub get

      - name: Build web (release)
        working-directory: frontend/music_room_app
        run: flutter build web --release

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: frontend/music_room_app/build/web
