name: Validate Pull Request

on:
  pull_request:
    branches: [ dev, main ]
    paths:
      - 'frontend/**'

concurrency:
  group: validate-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      
      - name: Get dependencies
        working-directory: frontend/music_room_app
        run: flutter pub get

      - name: Run tests
        working-directory: frontend/music_room_app
        run: flutter test

  build:
    name: Verify Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      
      - name: Get dependencies
        working-directory: frontend/music_room_app
        run: flutter pub get

      - name: Build web
        working-directory: frontend/music_room_app
        run: flutter build web --release
